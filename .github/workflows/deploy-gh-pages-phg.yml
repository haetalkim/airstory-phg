name: Deploy GitHub Pages (Air Story PHG)

# Builds the PHG test variant from `phg/` and deploys it as its own GitHub Pages
# artifact. Runs only on pushes that touch `phg/**` so the original `airstory/`
# deploy in deploy-gh-pages.yml is unaffected.
#
# IMPORTANT — Pages URL caveat:
#   GitHub Pages publishes ONE site per repo. If both this workflow and
#   deploy-gh-pages.yml target the same Pages site, whichever runs last wins
#   and overwrites the other's deploy. Pick ONE of:
#     (a) Configure a custom domain on the `github-pages-phg` environment so
#         this artifact serves from a separate domain.
#     (b) Move PHG into its own GitHub repo (true fork).
#     (c) Combine both builds into a single artifact (build root site at `/`
#         and PHG at `/phg/`) — would require modifying the original workflow,
#         which the plan explicitly opted not to do.
#
# Settings → Pages → Source = **GitHub Actions** (not “Deploy from branch”).
on:
  push:
    branches: [main]
    paths:
      - "phg/**"
      - ".github/workflows/deploy-gh-pages-phg.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-phg
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Separate environment so PHG-only secrets (e.g. a different Maps key) can
    # live independently from the main site under Settings → Environments.
    environment:
      name: github-pages-phg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: phg/package-lock.json

      - name: Install
        working-directory: phg
        run: npm ci

      - name: Verify Google Maps key (CRA bakes this at build time)
        env:
          MAPS: ${{ secrets.REACT_APP_GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -z "$MAPS" ]; then
            echo "::error::REACT_APP_GOOGLE_MAPS_API_KEY is missing."
            echo "Add it to this repo's github-pages-phg environment OR as a"
            echo "repository-level Actions secret named REACT_APP_GOOGLE_MAPS_API_KEY."
            exit 1
          fi

      - name: Build
        working-directory: phg
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL || 'https://air-sensor-api.onrender.com/api' }}
          REACT_APP_GOOGLE_MAPS_API_KEY: ${{ secrets.REACT_APP_GOOGLE_MAPS_API_KEY }}
          REACT_APP_VARIANT: phg
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: phg/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages-phg
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
