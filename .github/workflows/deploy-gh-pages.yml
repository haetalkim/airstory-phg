name: Deploy GitHub Pages (Air Quality Tracker)

# Canonical frontend: repo root (`src/`). Builds and pushes `build/` to branch `gh-pages`
# (same result as `npm run deploy`). Works when Pages source is **Deploy from branch → gh-pages**.
# The older `deploy-pages` artifact flow only updates the site if Pages source is **GitHub Actions**.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "tailwind.config.js"
      - "postcss.config.js"
      - ".github/workflows/deploy-gh-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL || 'https://air-sensor-api.onrender.com/api' }}
        run: npm run build

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: false
